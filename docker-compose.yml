version: '3.8'

services:
  # FastAPI Flight Bot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flight-bot-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./flight_bot.db
      - REDIS_URL=redis://redis:6379/0
      - KIWI_API_KEY=${KIWI_API_KEY}
      - KIWI_API_BASE=https://api.tequila.kiwi.com
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=flight-bot
      - FREE_GROUP_JID=${FREE_GROUP_JID}
      - SCAN_INTERVAL_MINUTES=120
      - FREE_DIGEST_INTERVAL_HOURS=6
      - DEFAULT_DEAL_THRESHOLD_DOMESTIC_BRL=299.0
      - DEFAULT_DEAL_THRESHOLD_INTL_BRL=1499.0
      - ALERT_COOLDOWN_HOURS=24
      - DEBUG=False
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    volumes:
      - ./flight_bot.db:/app/flight_bot.db
    restart: unless-stopped

  # Streamlit Admin Dashboard
  admin:
    image: python:3.11-slim
    container_name: flight-bot-admin
    working_dir: /app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -q streamlit pandas plotly requests &&
               streamlit run admin/streamlit_app.py"
    volumes:
      - .:/app
    depends_on:
      - app
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: flight-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Evolution API for WhatsApp (optional - comment out if self-hosting separately)
  # evolution:
  #   image: evolution-api:latest
  #   container_name: flight-bot-evolution
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/evolution
  #     - REDIS_URL=redis://redis:6379/0
  #     - EVOLUTION_API_PORT=8080
  #   depends_on:
  #     - redis
  #   restart: unless-stopped

  # PostgreSQL (optional - for production)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: flight-bot-postgres
  #   environment:
  #     - POSTGRES_DB=flight_bot
  #     - POSTGRES_USER=flight_bot
  #     - POSTGRES_PASSWORD=flight_bot_secure_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  redis-data:
  # postgres-data:

networks:
  default:
    name: flight-bot-network
