# Alembic configuration for database migrations

[loggers]
keys = root,sqlalchemy.engine,sqlalchemy.pool

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_sqlalchemy.pool]
level = WARN
handlers =
qualname = sqlalchemy.pool

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[sqlalchemy]
sqlalchemy.url =

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
timezone =

# max length of characters to apply to the
# "slug" field. set to -1 to disable, leaving
# migration files without character limits
# in the slug.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to skip the automatic
# creation of new alembic.ini file
# when revision files
# are created
# version_path_separator = :

# set to 'true' to search source files recursively
# in each "version" location
# file_template = %%(rev)s_%%(slug)s

# if set to 'true', the sqlalchemy.url setting will be interpreted as a
# Python expression which can optionally be a SQLAlchemy URL when
# sqlalchemy.poolclass is specified.
# sqlalchemy.future = True

# Logging configuration
#sqlalchemy.echo = False
#sqlalchemy.echo_pool = False

[mysqldb]
# driver = pymysql
